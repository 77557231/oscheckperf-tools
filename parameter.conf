# ================================================================================
# oscheckperf Configuration File
# ================================================================================
# This file contains all configurable parameters for oscheckperf
# Use with: ./oscheckperf -p parameter.conf
# Command line parameters override values in this file
# ================================================================================

# ================================================================================
# General parameters
# ================================================================================

# Unified test duration in seconds
# Default: 60
DURATION=60

# Output directory for test results
# Default: ./output
OUTPUT_DIR=./output

# Cleanup temp files after test
# Default: true
CLEANUP=true

# IO test tool: sysbench or fio
# Default: sysbench
IO_TOOL=sysbench

# SSH port for remote server connections
# Default: 22
SSH_PORT=22

# ================================================================================
# Test Module Switches
# ================================================================================
# Set to false to disable specific test modules
# Default: true (when no subcommand specified)
# Command line subcommands (cpu/mem/io/etc.) override these values

# Enable CPU performance test
# Default: true
CPU_ENABLED=true

# Enable memory performance test
# Default: true
MEMORY_ENABLED=true

# Enable IO performance test
# Default: true
IO_ENABLED=true

# Enable network performance test
# Default: true
NETWORK_ENABLED=true

# Enable threads performance test
# Default: true
THREADS_ENABLED=true

# Enable mutex performance test
# Default: true
MUTEX_ENABLED=true

# Enable pgbench performance test
# Default: false
PGBENCH_ENABLED=false

# ================================================================================
# CPU test parameters
# ================================================================================

# CPU test threads, 0=auto (uses all available CPUs)
# Default: 0
CPU_THREADS=0

# Max prime number for CPU test
# Default: 20000
CPU_MAX_PRIME=20000

# ================================================================================
# Memory test parameters
# ================================================================================

# Memory test threads, 0=auto
# Default: 0
MEMORY_THREADS=0

# Memory block size per operation
# Default: 8K
MEMORY_BLOCK_SIZE=8K

# Total memory size to test
# Default: 20G
MEMORY_TOTAL_SIZE=20G

# Memory operation type: read or write
# Default: read
MEMORY_OPER=read

# ================================================================================
# IO test parameters
# ================================================================================

# Total file size for IO test
# Default: 1G
IO_TOTAL_SIZE=1G

# IO test directory path
# Default: $HOME/oscheckperf/io_test
IO_PATH=

# --------------------------------------------------------------------------------
# sysbench-specific parameters
# --------------------------------------------------------------------------------

# sysbench IO test mode: sync, async
# Default: sync
SYSBENCH_IO_MODE=sync

# sysbench extra flags: direct, sync
# Default: direct
SYSBENCH_EXTRA_FLAGS=direct

# Number of sysbench threads
# Default: 4
SYSBENCH_THREADS=4

# Number of test files
# Default: 4
SYSBENCH_FILE_NUM=4

# Block size
# Default: 16K
SYSBENCH_BLOCK_SIZE=16K

# sysbench test profiles (for sysbench IO)
# Default: rndrw
SYSBENCH_PROFILES=rndrw

# sysbench IO test duration (uses DURATION if not set)
# Default: (empty - uses DURATION)
SYSBENCH_DURATION=

# --------------------------------------------------------------------------------
# fio-specific parameters
# --------------------------------------------------------------------------------

# fio test duration (uses DURATION if not set)
# Default: (empty - uses DURATION)
FIO_DURATION=

# fio test profiles, space-separated
# Available: read, write, randread, randwrite, rw, randrw, trim, randtrim, trimwrite
# Default: randrw
FIO_PROFILES=randrw

# fio block size
# Default: 16K
FIO_BS=16K

# I/O depth
# Default: 32
FIO_IODEPTH=32

# Number of jobs
# Default: 4
FIO_NUMJOBS=4

# Direct I/O mode (1=bypass OS cache)
# Default: 1
FIO_DIRECT=1

# Number of test files (simulates multi-datafile scenario)
# Default: 4
FIO_FILE_NUM=4

# I/O engine: libaio, sync, posixaio
# Default: libaio
FIO_IOENGINE=libaio

# ================================================================================
# Threads test parameters
# ================================================================================

# Number of threads for threads test, 0=auto (cpu_cores*4)
# Default: 0
THREADS_NUM=0

# Number of yields per request
# Default: 100
THREADS_YIELDS=100

# Number of mutex locks
# Default: 4
THREADS_LOCKS=4

# ================================================================================
# Mutex test parameters
# ================================================================================

# Number of threads for mutex test, 0=auto
# Default: 0
MUTEX_THREADS=0

# Number of mutexes
# Default: 1024
MUTEX_NUM=1024

# ================================================================================
# Network test parameters
# ================================================================================

# Network test mode: serial, parallel, or matrix
# Default: matrix
NETWORK_MODE=matrix

# Network test port
# Default: 25201
NETWORK_PORT=25201

# Network parallel connections
# Default: 1
NETWORK_PARALLEL=1

# ================================================================================
# pgbench test parameters (PostgreSQL benchmark)
# ================================================================================

# Enable pgbench test
# Default: false
PGBENCH_ENABLED=false

# pgbench test duration in seconds
# Default: 300
PGBENCH_DURATION=300

# Number of pgbench clients
# Default: 4
PGBENCH_CLIENTS=4

# Number of pgbench threads, 0=auto
# Default: 0
PGBENCH_THREADS=0

# pgbench scale factor (database size)
# Default: 100
PGBENCH_SCALE=100

# PostgreSQL database name for pgbench
# Default: pgbench_db
PGBENCH_DB=pgbench_db

# ================================================================================
# Installation parameters
# ================================================================================

# Installation target for -i option: sysbench, sshpass, oscheckperf, all
# Default: (empty)
INSTALL_TARGET=

# Server list file path
# Default: (empty)
SERVERS_FILE=

# ================================================================================
# Debug and dry-run parameters
# ================================================================================

# Enable debug mode (show detailed logs)
# Default: false
DEBUG=false

# Dry run mode (show commands without execution)
# Default: false
DRY_RUN=false

# Skip pre-test checks
# Default: false
NO_CHECKS=false

# ================================================================================
# End of configuration file
# ================================================================================
