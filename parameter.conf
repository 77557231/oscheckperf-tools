# ================================================================================
# oscheckperf Configuration File
# ================================================================================
# This file contains all configurable parameters for oscheckperf
# Use with: ./oscheckperf -p parameter.conf
# Command line parameters override values in this file
# ================================================================================

# ================================================================================
# General parameters
# ================================================================================

# Unified test duration in seconds
# Default: 60
DURATION=60

# Output directory for test results
# Default: ./output
OUTPUT_DIR=./output

# SSH port for remote server connections
# Default: 22
SSH_PORT=22

# ================================================================================
# Test Module Switches
# ================================================================================
# Set to false to disable specific test modules
# Default: true (when no subcommand specified)
# Command line subcommands (cpu/mem/io/etc.) override these values

# Include hardware information in performance report
# Default: true
REPORT_HARDWARE_INFO=true

# Enable CPU performance test
# Default: true
CPU_ENABLED=true

# Enable memory performance test
# Default: true
MEMORY_ENABLED=true

# Enable IO performance test
# Default: true
IO_ENABLED=true

# Enable network performance test
# Default: true
NETWORK_ENABLED=true

# Enable threads performance test
# Default: true
THREADS_ENABLED=true

# Enable mutex performance test
# Default: true
MUTEX_ENABLED=true

# ================================================================================
# CPU test parameters
# ================================================================================

# CPU test threads, 0=auto (uses all available CPUs)
# Default: 0
CPU_THREADS=0

# Max prime number for CPU test
# Default: 20000
CPU_MAX_PRIME=20000

# ================================================================================
# Memory test parameters
# ================================================================================

# Memory test threads, 0=auto
# Default: 0
MEMORY_THREADS=0

# Memory block size per operation
# Default: 8K
MEMORY_BLOCK_SIZE=8K

# Total memory size to test
# Default: 20G
MEMORY_TOTAL_SIZE=20G

# Memory operation type: read or write
# Default: read
MEMORY_OPER=read

# ================================================================================
# IO test parameters
# ================================================================================
# IO test tool: sysbench or fio
# Default: sysbench
IO_TOOL=sysbench

# Total file size for IO test
# Default: 1G
IO_TOTAL_SIZE=1G

# IO test directory path
# Default: $HOME/oscheckperf/io_test
IO_PATH=

# --------------------------------------------------------------------------------
# sysbench-specific parameters
# --------------------------------------------------------------------------------

# sysbench IO test mode: sync, async
# Default: sync
SYSBENCH_IO_MODE=sync

# sysbench extra flags: direct, sync
# Default: direct
SYSBENCH_EXTRA_FLAGS=direct

# Number of sysbench threads
# Default: 4
SYSBENCH_THREADS=4

# Number of test files
# Default: 4
SYSBENCH_FILE_NUM=4

# Block size
# Default: 16K
SYSBENCH_BLOCK_SIZE=16K

# sysbench test profiles (for sysbench IO), space-separated
# Available: seqwr, seqrewr, seqrd, rndrd, rndwr, rndrw
#   - seqwr: Sequential write
#   - seqrewr: Sequential rewrite
#   - seqrd: Sequential read
#   - rndrd: Random read
#   - rndwr: Random write
#   - rndrw: Random read/write (default)
# Default: rndrw
SYSBENCH_PROFILES=rndrw

# sysbench IO test duration (uses DURATION if not set)
# Default: (empty - uses DURATION)
SYSBENCH_DURATION=

# --------------------------------------------------------------------------------
# fio-specific parameters
# --------------------------------------------------------------------------------

# fio test duration (uses DURATION if not set)
# Default: (empty - uses DURATION)
FIO_DURATION=

# fio test profiles, space-separated
# Available: read, write, randread, randwrite, rw, randrw, trim, randtrim, trimwrite
#   - read: Sequential read
#   - write: Sequential write
#   - randread: Random read
#   - randwrite: Random write
#   - rw: Sequential read/write (mixed)
#   - randrw: Random read/write (mixed) (default)
#   - trim: Sequential TRIM (SSD optimization)
#   - randtrim: Random TRIM (SSD optimization)
#   - trimwrite: Write with TRIM (SSD optimization)
# Default: randrw
FIO_PROFILES=randrw

# fio block size
# Default: 16K
FIO_BS=16K

# I/O depth
# Default: 32
FIO_IODEPTH=32

# Number of jobs
# Default: 4
FIO_NUMJOBS=4

# Direct I/O mode (1=bypass OS cache)
# Default: 1
FIO_DIRECT=1

# Number of test files (simulates multi-datafile scenario)
# Default: 4
FIO_FILE_NUM=4

# I/O engine: libaio, sync, posixaio
# Default: libaio
FIO_IOENGINE=libaio

# ================================================================================
# Threads test parameters
# ================================================================================

# Number of threads for threads test, 0=auto (cpu_cores*4)
# Default: 0
THREADS_NUM=0

# Number of yields per request
# Default: 100
THREADS_YIELDS=100

# Number of mutex locks
# Default: 4
THREADS_LOCKS=4

# ================================================================================
# Mutex test parameters
# ================================================================================

# Number of threads for mutex test, 0=auto
# Default: 0
MUTEX_THREADS=0

# Number of mutexes
# Default: 1024
MUTEX_NUM=1024

# ================================================================================
# Network test parameters
# ================================================================================

# Network test tool
# Default: iperf3
NETWORK_TOOL=iperf3

# Network test mode: serial or matrix
# serial: uses first host as server, supports local/remote server
# matrix: full matrix cross-testing between all server pairs
# Default: matrix
NETWORK_MODE=matrix

# Network test port
# Default: 25201
NETWORK_PORT=25201

# Network parallel connections
# Default: 1
NETWORK_PARALLEL=1

# ================================================================================
# Installation parameters
# ================================================================================

# Installation target for -i option: sysbench, sshpass, fio, iperf3, numactl, ethtool, jq, oscheckperf, all
# Default: (empty)
INSTALL_TARGET=

# Server list file path
# Default: (empty)
SERVERS_FILE=

# ================================================================================
# Debug and dry-run parameters
# ================================================================================

# Enable debug mode (show detailed logs)
# Default: false
DEBUG=false

# Dry run mode (show commands without execution)
# Default: false
DRY_RUN=false

# Skip pre-test checks
# Default: false
NO_CHECKS=false

# ================================================================================
# End of configuration file
# ================================================================================
